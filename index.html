<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>46 Industries</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: yellow;
            font-family: Arial, sans-serif;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            margin: 5px 0 20px 0;
        }

        #count {
            font-size: 80px;
            font-weight: bold;
            margin: 20px 0;
        }

        button {
            padding: 12px 20px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>46 Industries</h1>

<p>Globalny licznik kliknięć:</p>

<h2 id="count">Ładowanie...</h2>

<button id="btn">Kliknij</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
  getDatabase,
  ref,
  onValue,
  runTransaction
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD4u20qbTU-IUJG-_F3nPWvrecfAxumpcs",
  authDomain: "industries-15835.firebaseapp.com",
  databaseURL: "https://industries-15835-default-rtdb.firebaseio.com",
  projectId: "industries-15835",
  storageBucket: "industries-15835.firebasestorage.app",
  messagingSenderId: "228905340994",
  appId: "1:228905340994:web:db37d39c0ce9116c64dddb",
  measurementId: "G-8ZQ2BCKMBL"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const clicksRef = ref(db, "clicks");

onValue(clicksRef, (snapshot) => {
  document.getElementById("count").textContent =
    snapshot.val() ?? 0;
});

document.getElementById("btn").addEventListener("click", () => {
  runTransaction(clicksRef, (current) => {
    return (current || 0) + 1;
  });
});

</script>

</body>
</html>
